<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>jack wasielewski</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f4f7;
      --bg-surface: #eae8ef;
      --bg-overlay: rgba(245, 244, 247, 0.95);
      --text: #3d3852;
      --text-dim: #8a84a0;
      --text-bright: #1a1625;
      --accent: #7b5fbf;
      --accent-hover: #5a4e8a;
      --border: #d4d0de;
      --border-light: #e4e1ec;
      --cursor: #7b5fbf;
      --mono: 'IBM Plex Mono', 'Consolas', 'Monaco', monospace;
    }

    html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }

    body {
      font-family: var(--mono);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    a { color: var(--accent); text-decoration: none; transition: color 0.2s; }
    a:hover { color: var(--text-bright); }

    ::selection { background: #c8c2dc; color: var(--text-bright); }

    /* ── 4px edge crop on portfolio images ── */
    .home-thumb img,
    .overview-thumb img,
    .mobile-scroll .spread img {
      clip-path: inset(4px);
    }

    /* Slideshow: white border overlay to mask edges */
    .slideshow-viewport::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      border: 4px solid #fff;
      pointer-events: none;
      z-index: 1;
    }
    .slideshow-viewport.has-video::after,
    .slideshow-viewport.has-link::after { display: none; }

    .slide-link-wrap {
      width: 100%;
      height: 100%;
      position: relative;
      overflow: hidden;
    }
    .slideshow-viewport .slide-link-wrap {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }
    .slide-link-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.3);
      transition: background 0.2s;
      cursor: pointer;
    }
    .slide-link-overlay:hover {
      background: rgba(0,0,0,0.45);
    }
    .slide-link-cta {
      font-family: var(--mono);
      font-size: 0.85rem;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.8);
      padding: 10px 24px;
      border-radius: 4px;
      transition: background 0.2s, border-color 0.2s;
      backdrop-filter: blur(2px);
      text-decoration: none;
    }
    .slide-link-overlay:hover .slide-link-cta {
      background: rgba(255,255,255,0.15);
      border-color: #fff;
    }

    /* ── Home button ── */
    .home-btn {
      position: fixed;
      top: 16px; left: 20px;
      z-index: 150;
      cursor: pointer;
      color: var(--text-dim);
      transition: color 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: 0.7rem;
      text-decoration: none;
    }
    .home-btn:hover { color: var(--accent); }
    .home-btn svg { width: 14px; height: 14px; }

    /* ── Boot Sequence ── */
    .boot-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: var(--bg);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 10% 12%;
      font-family: var(--mono);
      font-size: 13px;
      color: var(--text-dim);
      line-height: 1.8;
      transition: opacity 0.5s ease;
    }
    .boot-overlay.fade-out { opacity: 0; pointer-events: none; }
    .boot-line { opacity: 0; transform: translateY(4px); transition: opacity 0.2s ease, transform 0.2s ease; }
    .boot-line.visible { opacity: 1; transform: translateY(0); }
    .boot-line .ok { color: var(--accent); }
    .boot-cursor { display: inline-block; width: 7px; height: 14px; background: var(--accent); animation: bootBlink 0.6s step-end infinite; vertical-align: middle; margin-left: 2px; }
    @keyframes bootBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    /* ── Home Grid ── */
    .home-tagline {
      font-size: 0.85rem;
      color: var(--text);
      margin-bottom: 6px;
      line-height: 1.5;
    }
    .home-tagline .name { color: var(--text-bright); }
    .home-tagline .sep { color: var(--border); margin: 0 2px; }
    .home-sub {
      font-size: 0.72rem;
      color: var(--text-dim);
      margin-bottom: 24px;
    }
    .home-sub a { color: var(--accent); }

    .home-tabs-toggle { display: none; }
    .home-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 16px;
    }
    .home-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 8px;
    }
    .home-thumb {
      position: relative;
      cursor: pointer;
      border-radius: 3px;
      overflow: hidden;
      background: #fff;
      border: 2px solid transparent;
      transition: border-color 0.15s, opacity 0.4s ease, transform 0.4s ease;
      opacity: 0;
      transform: translateY(6px);
    }
    .home-thumb.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .home-thumb:hover {
      border-color: var(--accent);
    }
    .home-thumb img {
      width: 100%;
      aspect-ratio: 16/10;
      object-fit: cover;
      display: block;
    }
    .home-thumb .home-thumb-num {
      position: absolute;
      bottom: 2px;
      right: 4px;
      font-size: 0.55rem;
      color: var(--text-dim);
      background: rgba(245,244,247,0.85);
      padding: 1px 4px;
      border-radius: 2px;
    }
    .home-thumb .home-thumb-play {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 32px; height: 22px;
      background: rgba(0,0,0,0.65);
      border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── Content area ── */
    .content-area {
      flex: 1;
      padding: 40px 24px 160px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      z-index: 1;
    }

    .content-inner {
      width: 100%;
      max-width: 1200px;
    }

    /* ── Animations ── */
    .output-block {
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .cmd-echo {
      color: var(--text-dim);
      font-size: 0.75rem;
      margin-bottom: 12px;
      letter-spacing: 0.02em;
    }

    .cmd-echo span { color: var(--accent); }

    /* ── Home ── */
    .home-output { padding: 60px 0; }

    .home-output h1 {
      font-family: var(--mono);
      font-size: 1.1rem;
      font-weight: 400;
      color: var(--text-bright);
      margin-bottom: 24px;
      text-transform: lowercase;
    }

    .home-output p {
      font-size: 0.82rem;
      color: var(--text);
      margin-bottom: 12px;
      max-width: 600px;
      line-height: 1.8;
    }

    .home-output .contact-line {
      margin-top: 28px;
      font-size: 0.78rem;
      color: var(--text-dim);
    }

    .home-output .contact-line a {
      color: var(--text);
      border-bottom: 1px dotted var(--border);
      padding-bottom: 1px;
    }

    .home-output .contact-line a:hover {
      color: var(--text-bright);
      border-color: var(--accent);
    }

    /* ── Slideshow (desktop) ── */
    .slideshow-container {
      position: relative;
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      user-select: none;
    }

    .slideshow-viewport {
      position: relative;
      width: 100%;
      aspect-ratio: 16/10;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .slideshow-viewport img,
    .slideshow-viewport .slide-video {
      max-width: 100%;
      max-height: 100%;
      display: block;
    }

    .slideshow-viewport img {
      object-fit: contain;
      width: auto;
      height: auto;
      max-width: 100%;
      max-height: 100%;
      transition: opacity 0.25s ease;
    }

    .slideshow-viewport .slide-video {
      width: 100%;
      height: 100%;
      position: relative;
      background: #000;
    }

    .slideshow-viewport .slide-video iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
    }

    /* Slide controls bar */
    .slide-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      font-size: 0.72rem;
      color: var(--text-dim);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 4px 4px;
      background: var(--bg-surface);
    }

    .slide-controls .slide-nav {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .slide-controls button {
      background: none;
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 4px 10px;
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--text);
      cursor: pointer;
      transition: all 0.15s;
    }

    .slide-controls button:hover {
      border-color: var(--accent);
      color: var(--text-bright);
    }

    .slide-controls button:disabled {
      opacity: 0.3;
      cursor: default;
    }

    .slide-controls button:disabled:hover {
      border-color: var(--border);
      color: var(--text);
    }

    .slide-counter {
      font-variant-numeric: tabular-nums;
    }

    .slide-chapter {
      font-size: 0.68rem;
      color: var(--text-dim);
      margin-left: 4px;
      max-width: 160px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .slide-progress-wrap {
      width: 100%;
      height: 2px;
      background: var(--border-light);
      border-radius: 0 0 4px 4px;
      overflow: hidden;
    }

    .slide-progress-bar {
      height: 100%;
      background: var(--accent);
      transition: width 0.3s ease;
      border-radius: 0 0 4px 4px;
    }

    .slide-kbd-hint {
      text-align: center;
      padding: 6px 0 0;
      font-size: 0.65rem;
      color: var(--text-dim);
      opacity: 0.5;
      transition: opacity 0.3s;
    }

    .slideshow-container:hover .slide-kbd-hint { opacity: 0.8; }

    .slide-kbd-hint kbd {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 1px 4px;
      font-family: var(--mono);
      font-size: 0.62rem;
    }

    /* Crossfade transition */
    .slideshow-viewport .slide-fade {
      animation: slideFadeIn 0.3s ease;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    @keyframes slideFadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .slide-actions {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ── Compare view ── */
    .compare-container {
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
    }

    .compare-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .compare-header h3 {
      font-family: var(--mono);
      font-size: 0.8rem;
      font-weight: 400;
      color: var(--text-bright);
    }

    .compare-header button {
      background: none;
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 4px 10px;
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--text);
      cursor: pointer;
    }

    .compare-header button:hover {
      border-color: var(--accent);
      color: var(--text-bright);
    }

    .compare-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .compare-panel {
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      background: #fff;
    }

    .compare-panel img {
      width: 100%;
      height: auto;
      display: block;
    }

    .compare-panel .compare-label {
      padding: 6px 10px;
      font-size: 0.68rem;
      color: var(--text-dim);
      background: var(--bg-surface);
      border-top: 1px solid var(--border);
    }

    @media (max-width: 768px) {
      .compare-grid {
        grid-template-columns: 1fr;
      }
    }

    /* ── Overview modal ── */
    .overview-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: var(--bg-overlay);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 200;
      overflow-y: auto;
      padding: 24px;
    }

    .overview-overlay.open { display: block; }

    .overview-header {
      max-width: 1200px;
      margin: 0 auto 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .overview-header h3 {
      font-family: var(--mono);
      font-size: 0.82rem;
      font-weight: 400;
      color: var(--text-bright);
    }

    .overview-header button {
      background: none;
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 4px 12px;
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--text);
      cursor: pointer;
    }

    .overview-header button:hover {
      border-color: var(--accent);
      color: var(--text-bright);
    }

    /* Chapter tabs */
    .chapter-tabs {
      max-width: 1200px;
      margin: 0 auto 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .chapter-tab {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 4px 10px;
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.15s;
    }

    .chapter-tab:hover, .chapter-tab.active {
      border-color: var(--accent);
      color: var(--text-bright);
    }

    .chapter-tab.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    /* Thumbnail grid */
    .overview-grid {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 8px;
    }

    .overview-thumb {
      position: relative;
      cursor: pointer;
      border: 2px solid transparent;
      border-radius: 3px;
      overflow: hidden;
      transition: all 0.15s;
      background: #fff;
    }

    .overview-thumb:hover {
      border-color: var(--accent);
    }

    .overview-thumb.current {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(107, 94, 160, 0.2);
    }

    .overview-thumb img {
      width: 100%;
      aspect-ratio: 16/10;
      object-fit: cover;
      display: block;
    }

    .overview-thumb .thumb-number {
      position: absolute;
      bottom: 2px;
      right: 4px;
      font-size: 0.6rem;
      color: var(--text-dim);
      background: rgba(245,244,247,0.85);
      padding: 1px 4px;
      border-radius: 2px;
    }

    .overview-thumb .thumb-video {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 1.4rem;
      color: #fff;
      text-shadow: 0 1px 4px rgba(0,0,0,0.5);
    }


    /* ── Presentation mode ── */
    .present-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #000;
      z-index: 400;
      align-items: center;
      justify-content: center;
      cursor: none;
    }

    .present-overlay.open {
      display: flex;
    }

    .present-overlay #presentContent {
      max-width: 100%;
      max-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .present-overlay img {
      max-width: 100%;
      max-height: 100vh;
      object-fit: contain;
    }

    .present-overlay .slide-video {
      width: 90vw;
      max-width: 1400px;
      aspect-ratio: 16/9;
      position: relative;
    }

    .present-overlay .slide-video iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
    }

    .present-exit-hint {
      position: fixed;
      top: 12px;
      right: 16px;
      font-family: var(--mono);
      font-size: 0.65rem;
      color: rgba(255,255,255,0.15);
      z-index: 401;
      transition: color 0.3s;
      cursor: pointer;
    }

    .present-overlay:hover .present-exit-hint {
      color: rgba(255,255,255,0.4);
    }

    /* ── Show Reel ── */
    .showreel-output { padding: 40px 0 80px; }

    .showreel-output h2 {
      font-family: var(--mono);
      font-size: 0.9rem;
      font-weight: 400;
      color: var(--text-bright);
      margin-bottom: 8px;
    }

    .showreel-output .desc {
      font-size: 0.78rem;
      color: var(--text-dim);
      margin-bottom: 24px;
    }

    .showreel-output .video-embed {
      width: 100%;
      aspect-ratio: 16/9;
      position: relative;
      background: #000;
      border-radius: 4px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .showreel-output .video-embed iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
    }

    /* ── Resume ── */
    .resume-output { padding: 40px 0 80px; text-align: center; }

    .resume-output img {
      max-width: 700px;
      width: 100%;
      height: auto;
      display: block;
      margin: 0 auto;
      border: 1px solid var(--border);
      border-radius: 4px;
    }

    .resume-output .dl-link {
      display: inline-block;
      margin-top: 20px;
      padding: 6px 16px;
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--text);
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 3px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .resume-output .dl-link:hover {
      color: var(--text-bright);
      border-color: var(--accent);
    }

    /* ── About ── */
    .about-output { padding: 40px 0 80px; }

    .about-output h2 {
      font-family: var(--mono);
      font-size: 0.9rem;
      font-weight: 400;
      color: var(--text-bright);
      margin-bottom: 16px;
    }

    .about-output p {
      font-size: 0.82rem;
      color: var(--text);
      margin-bottom: 12px;
      max-width: 600px;
      line-height: 1.8;
    }

    .about-output .info-grid {
      margin-top: 20px;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 6px 20px;
      font-size: 0.78rem;
    }

    .about-output .info-grid .label { color: var(--text-dim); }
    .about-output .info-grid .value { color: var(--text); }

    /* ── Contact ── */
    .contact-output { padding: 40px 0 80px; }

    .contact-output h2 {
      font-family: var(--mono);
      font-size: 0.9rem;
      font-weight: 400;
      color: var(--text-bright);
      margin-bottom: 16px;
    }

    .contact-output .contact-grid {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 8px 20px;
      font-size: 0.8rem;
    }

    .contact-output .contact-grid .label { color: var(--text-dim); }

    /* ── Guestbook ── */
    .guestbook-output { padding: 40px 0 80px; }

    .guestbook-output h2 {
      font-family: var(--mono);
      font-size: 0.9rem;
      font-weight: 400;
      color: var(--text-bright);
      margin-bottom: 8px;
    }

    .guestbook-output .gb-desc {
      font-size: 0.78rem;
      color: var(--text-dim);
      margin-bottom: 24px;
    }

    .gb-form {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-width: 500px;
      margin-bottom: 32px;
    }

    .gb-form input, .gb-form textarea {
      font-family: var(--mono);
      font-size: 0.78rem;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 3px;
      background: #fff;
      color: var(--text-bright);
      outline: none;
      transition: border-color 0.2s;
    }

    .gb-form input:focus, .gb-form textarea:focus {
      border-color: var(--accent);
    }

    .gb-form textarea { resize: vertical; min-height: 60px; }

    .gb-form button {
      align-self: flex-start;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 6px 16px;
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--text);
      cursor: pointer;
      transition: all 0.15s;
    }

    .gb-form button:hover {
      border-color: var(--accent);
      color: var(--text-bright);
    }

    .gb-entries {
      border-top: 1px dotted var(--border);
      padding-top: 20px;
    }

    .gb-entry {
      margin-bottom: 20px;
      animation: fadeIn 0.3s ease;
    }

    .gb-entry .gb-meta {
      font-size: 0.68rem;
      color: var(--text-dim);
      margin-bottom: 4px;
    }

    .gb-entry .gb-msg {
      font-size: 0.78rem;
      color: var(--text);
      line-height: 1.6;
    }

    .gb-empty {
      font-size: 0.78rem;
      color: var(--text-dim);
      font-style: italic;
    }

    /* ── Help ── */
    .help-output { padding: 20px 0 40px; }

    /* ── Pong overlay ── */
    .pong-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.97);
      z-index: 500;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      color: #fff;
    }
    .pong-overlay canvas { display: block; border: 1px solid rgba(255,255,255,0.15); }
    .pong-select { text-align: center; max-width: 500px; }
    .pong-select h3 { font-size: 0.85rem; font-weight: 400; margin-bottom: 16px; color: var(--accent); }
    .pong-select p { font-size: 0.72rem; color: #999; margin-bottom: 20px; }
    .pong-fighters { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; margin-bottom: 20px; }
    .pong-fighter {
      cursor: pointer; border: 2px solid transparent; border-radius: 3px;
      overflow: hidden; transition: border-color 0.15s; position: relative;
    }
    .pong-fighter:hover { border-color: var(--accent); }
    .pong-fighter.selected { border-color: #fff; }
    .pong-fighter img { width: 100%; aspect-ratio: 16/10; object-fit: cover; display: block; }
    .pong-fighter .pong-fighter-name {
      position: absolute; bottom: 0; left: 0; right: 0;
      font-size: 0.5rem; background: rgba(0,0,0,0.7); padding: 2px 4px;
      text-align: center; color: #ccc;
    }
    .pong-vs { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 16px; }
    .pong-vs img { width: 80px; aspect-ratio: 16/10; object-fit: cover; border-radius: 3px; border: 1px solid rgba(255,255,255,0.2); }
    .pong-vs .vs-text { font-size: 1rem; color: var(--accent); font-weight: 500; }
    .pong-btn {
      background: var(--accent); color: #fff; border: none; border-radius: 3px;
      padding: 8px 24px; font-family: var(--mono); font-size: 0.78rem; cursor: pointer;
      transition: opacity 0.15s;
    }
    .pong-btn:hover { opacity: 0.85; }
    .pong-btn:disabled { opacity: 0.3; cursor: default; }
    .pong-score { font-size: 0.85rem; margin-bottom: 8px; letter-spacing: 2px; }
    .pong-exit { font-size: 0.65rem; color: #666; margin-top: 8px; }

    /* ── Terminal bar ── */
    .terminal-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--bg-surface);
      border-top: none;
      padding: 10px 24px 14px;
      z-index: 100;
    }

    .terminal-inner { max-width: 1200px; margin: 0 auto; }

    /* Terminal history */
    .terminal-history {
      margin-bottom: 4px;
    }
    .terminal-history-line {
      font-size: 0.7rem;
      color: var(--text-dim);
      line-height: 1.6;
      opacity: 0.45;
    }
    .terminal-history-line .hist-cmd { color: var(--accent); }
    .terminal-history-line .hist-result { color: var(--text-dim); }

    .prompt-line {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .prompt-line .chevron {
      color: var(--accent);
      font-size: 0.9rem;
      flex-shrink: 0;
      font-weight: 500;
    }

    .prompt-line input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      font-family: var(--mono);
      font-size: 0.85rem;
      color: var(--accent);
      caret-color: var(--accent);
    }

    .prompt-line input::placeholder {
      color: var(--text-dim);
      opacity: 0.5;
    }

    .hint-text {
      font-size: 0.7rem;
      color: var(--text-dim);
      margin-bottom: 8px;
      opacity: 0.6;
    }

    .hint-text span { color: var(--text); }

    .cmd-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 4px 14px;
      font-size: 0.73rem;
    }

    .cmd-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      transition: color 0.15s;
      color: var(--text-dim);
    }

    .cmd-chip:hover { color: var(--text-bright); }

    .cmd-chip .chip-name {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 2px 8px;
      color: var(--text);
      font-size: 0.72rem;
      transition: all 0.15s;
    }

    .cmd-chip:hover .chip-name {
      border-color: var(--accent);
      color: var(--text-bright);
    }

    .cmd-chip .chip-desc { font-size: 0.7rem; }

    /* ── Mobile: endless scroll ── */
    .mobile-scroll {
      display: none;
      padding: 12px 0 80px;
    }

    .mobile-scroll .spread {
      width: 100%;
    }

    .mobile-scroll .spread img {
      width: 100%;
      height: auto;
      display: block;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .mobile-scroll .spread img.loaded { opacity: 1; }

    .mobile-scroll .video-embed {
      width: 100%;
      aspect-ratio: 16/9;
      position: relative;
      background: #000;
    }

    .mobile-scroll .video-embed iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
    }

    .mobile-scroll .video-label {
      text-align: center;
      padding: 8px;
      font-size: 0.68rem;
      color: var(--text-dim);
    }

    /* ── Responsive ── */
    /* ── Terminal toggle (hidden on desktop) ── */
    .terminal-toggle { display: none; }
    .terminal-bar.terminal-collapsed .terminal-inner { display: none; }

    /* ── Chapter picker (hidden on desktop) ── */
    .chapter-picker-btn { display: none; }
    .chapter-picker-overlay {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: var(--bg-overlay); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      z-index: 300; padding: 24px; overflow-y: auto;
    }
    .chapter-picker-overlay.open { display: block; }
    .chapter-picker-item {
      display: block; padding: 14px 16px; font-family: var(--mono); font-size: 0.82rem;
      color: var(--text); border-bottom: 1px solid var(--border); cursor: pointer; text-decoration: none;
    }
    .chapter-picker-item:active { color: var(--accent); }
    .chapter-picker-item .picker-num { color: var(--accent); margin-right: 8px; }

    /* ── Mobile chapter dividers ── */
    .mobile-chapter-divider {
      position: sticky; top: 0; z-index: 10; background: var(--bg);
      padding: 10px 12px; font-family: var(--mono); font-size: 0.72rem;
      color: var(--text-dim); border-bottom: 1px solid var(--border);
    }
    .mobile-chapter-divider .chapter-num { color: var(--accent); margin-right: 6px; }

    @media (max-width: 768px) {
      .content-area { padding: 20px 12px 70px; padding-left: 48px; }
      .terminal-bar { padding: 10px 14px 14px; transition: padding 0.25s ease; }
      .terminal-bar.terminal-collapsed { padding: 0; }

      .terminal-toggle {
        display: flex; align-items: center; justify-content: center;
        width: 100%; padding: 10px 0; background: none; border: none;
        font-family: var(--mono); font-size: 1rem; color: var(--accent); cursor: pointer;
      }

      .home-output { padding: 30px 0; }
      .home-output h1 { font-size: 0.95rem; }

      .home-grid { grid-template-columns: repeat(3, 1fr); gap: 4px; }
      .home-btn { min-width: 44px; min-height: 44px; top: 8px; left: 8px; }
      .home-tabs { display: none; }
      .home-tabs.expanded { display: flex; }
      .home-tabs-toggle {
        display: inline-flex; align-items: center; gap: 4px;
        font-family: var(--mono); font-size: 0.68rem; color: var(--accent);
        cursor: pointer; margin-bottom: 10px; background: none; border: 1px solid var(--border);
        border-radius: 3px; padding: 5px 10px;
      }
      .home-tabs-toggle .arrow { transition: transform 0.2s; }
      .home-tabs-toggle.open .arrow { transform: rotate(90deg); }

      .home-thumb-num { font-size: 0.65rem; }
      .mobile-scroll .video-label { font-size: 0.75rem; }
      .present-exit-hint { font-size: 0.72rem; color: rgba(255,255,255,0.4); }
      .terminal-history-line { font-size: 0.75rem; }
      .hint-text { font-size: 0.75rem; }
      .present-overlay { cursor: default; }

      .back-to-top { bottom: 60px; right: 56px; }

      .cmd-chip .chip-desc { display: none; }

      /* Hide desktop slideshow, show mobile scroll */
      .slideshow-container { display: none !important; }
      .mobile-scroll { display: block !important; }

      .chapter-picker-btn {
        display: flex; position: fixed; bottom: 60px; right: 12px;
        width: 40px; height: 40px; border-radius: 3px;
        background: var(--bg-surface); border: 1px solid var(--border);
        color: var(--accent); align-items: center; justify-content: center;
        font-family: var(--mono); font-size: 0.75rem; cursor: pointer; z-index: 98;
      }
    }

    /* ── Back to top ── */
    .back-to-top {
      position: fixed;
      bottom: 140px;
      right: 20px;
      width: 32px;
      height: 32px;
      border-radius: 3px;
      background: var(--bg-surface);
      color: var(--text-dim);
      border: 1px solid var(--border);
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      z-index: 99;
      transition: all 0.2s;
      font-family: var(--mono);
    }

    .back-to-top:hover {
      color: var(--text-bright);
      border-color: var(--accent);
    }

    .back-to-top.visible { display: flex; }
  </style>
</head>
<body>

  <!-- Home button -->
  <a class="home-btn" onclick="runCmd('home')" title="home">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
      <polyline points="9 22 9 12 15 12 15 22"/>
    </svg>
  </a>

  <!-- Boot Sequence Overlay -->
  <div class="boot-overlay" id="bootOverlay">
    <div class="boot-line" id="boot0">jack_wasielewski_portfolio v4.2</div>
    <div class="boot-line" id="boot1">loading<span class="boot-cursor"></span></div>
    <div class="boot-line" id="boot2" style="color: var(--accent);">ready_</div>
  </div>

  <!-- Content area -->
  <div class="content-area" id="contentArea">
    <div class="content-inner" id="contentInner"></div>
  </div>

  <!-- Back to top -->
  <button class="back-to-top" id="backToTop" onclick="smartScrollUp()">&#8593;</button>

  <!-- Chapter picker (mobile) -->
  <button class="chapter-picker-btn" id="chapterPickerBtn" onclick="openChapterPicker()" style="display:none;">&#9776;</button>
  <div class="chapter-picker-overlay" id="chapterPickerOverlay"></div>

  <!-- Overview modal -->
  <div class="overview-overlay" id="overviewOverlay">
    <div class="overview-header">
      <h3>// overview — select a page</h3>
      <div style="display:flex;gap:6px;">
        <button onclick="filterChapter('all')">all pages</button>
        <button onclick="closeOverview()">close [esc]</button>
      </div>
    </div>
    <div class="chapter-tabs" id="chapterTabs"></div>
    <div class="overview-grid" id="overviewGrid"></div>
  </div>


  <!-- Presentation mode overlay -->
  <div class="present-overlay" id="presentOverlay" tabindex="0">
    <div id="presentContent"></div>
    <div class="present-exit-hint" id="presentExitHint" onclick="closePresent()">esc to exit</div>
  </div>

  <!-- Terminal bar -->
  <div class="terminal-bar" id="terminalBar">
    <button class="terminal-toggle" id="terminalToggle" onclick="toggleTerminal()">&#8250;</button>
    <div class="terminal-inner">
      <div class="terminal-history" id="terminalHistory"></div>
      <div class="prompt-line">
        <span class="chevron">&#8250;</span>
        <input type="text" id="cmdInput" autocomplete="off" spellcheck="false">
      </div>
      <div class="hint-text">type <span>help</span> for commands, or try:</div>
      <div class="cmd-chips">
        <div class="cmd-chip" onclick="runCmd('portfolio')">
          <span class="chip-name">portfolio</span>
          <span class="chip-desc">- browse work</span>
        </div>
        <div class="cmd-chip" onclick="runCmd('showreel')">
          <span class="chip-name">showreel</span>
          <span class="chip-desc">- animation reel</span>
        </div>
        <div class="cmd-chip" onclick="runCmd('about')">
          <span class="chip-name">about</span>
          <span class="chip-desc">- about me</span>
        </div>
        <div class="cmd-chip" onclick="runCmd('contact')">
          <span class="chip-name">contact</span>
          <span class="chip-desc">- get in touch</span>
        </div>
        <div class="cmd-chip" onclick="runCmd('resume')">
          <span class="chip-name">resume</span>
          <span class="chip-desc">- download cv</span>
        </div>
        <div class="cmd-chip" onclick="runCmd('home')">
          <span class="chip-name">home</span>
          <span class="chip-desc">- back to start</span>
        </div>
      </div>
    </div>
  </div>

  <script>


    // ══════════════════════════════════════════
    // ── Slide data ──
    // ══════════════════════════════════════════
    const videoReplacements = {
      20:  { id: "kcgKxwaDVxo", label: "mama's dungeon — watch the animation" },
      34:  null,
      66:  null,
      91:  { id: "9YbiHt_vGI4", label: "chimera — watch the walkthrough" },
      125: { id: "np0nULSMyXQ", label: "fusion babies — watch the animated short film" },
      126: null,
    };

    const videoInsertions = {
      65:  { id: "pXYn6NJ6bdM", label: "good afternoon charlie — video" },
      104: { id: "dj6zxYepuGc", label: "dogma — watch the exploration" },
    };

    const linkInsertions = {
      65:  { label: "good afternoon charlie", url: "https://jackwasielewski.itch.io/good-afternoon-charlie", cta: "play on itch.io", thumb: "images/gac_screenshot.webp", afterVideo: true },
    };

    const slides = [];
    const chapterMap = [];

    (function buildSlides() {
      const chapterSpreads = {
        1:   "cover",
        3:   "table of contents",
        4:   "mama's dungeon",
        21:  "husk rave",
        35:  "professional work",
        55:  "good afternoon charlie",
        67:  "virginia tech undergrad",
        74:  "take a hike",
        80:  "chimera",
        99:  "dogma",
        105: "fusion babies",
        127: "back cover",
      };

      for (let i = 1; i <= 127; i++) {
        if (chapterSpreads[i]) {
          chapterMap.push({ name: chapterSpreads[i], slideIndex: slides.length });
        }

        if (videoReplacements.hasOwnProperty(i)) {
          const vid = videoReplacements[i];
          if (vid) {
            slides.push({ type: 'video', id: vid.id, label: vid.label, spreadNum: i });
          }
          continue;
        }

        const num = String(i).padStart(3, "0");
        slides.push({
          type: 'image',
          src: `images/wasielewski_jack_portfolio_spread_${num}.webp`,
          spreadNum: i,
        });

        if (videoInsertions.hasOwnProperty(i)) {
          const vid = videoInsertions[i];
          slides.push({ type: 'video', id: vid.id, label: vid.label, spreadNum: i });
        }

        if (linkInsertions.hasOwnProperty(i)) {
          const lnk = linkInsertions[i];
          slides.push({ type: 'link', label: lnk.label, url: lnk.url, cta: lnk.cta, thumb: lnk.thumb, spreadNum: i });
        }
      }
    })();


    // ══════════════════════════════════════════
    // ── State ──
    // ══════════════════════════════════════════
    let currentSlide = 0;
    let currentPage = 'home';
    const cmdHistory = [];
    let historyIdx = -1;
    const isMobile = () => window.innerWidth <= 768;
    let terminalCollapsed = false;

    function toggleTerminal() {
      const bar = document.getElementById('terminalBar');
      terminalCollapsed = !terminalCollapsed;
      bar.classList.toggle('terminal-collapsed', terminalCollapsed);
      const btn = document.getElementById('terminalToggle');
      btn.textContent = terminalCollapsed ? '\u203A' : '\u2039';
      if (!terminalCollapsed) {
        setTimeout(() => document.getElementById('cmdInput').focus(), 100);
      }
    }

    function goToPortfolioSlide(idx) {
      if (isMobile()) {
        runCmd('portfolio');
        setTimeout(() => {
          const el = document.getElementById('mobileSlide' + idx);
          if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 100);
      } else {
        runCmd('portfolio');
        setTimeout(() => goToSlide(idx), 50);
      }
    }

    function mobilePresent(idx) {
      currentSlide = idx;
      openPresent();
    }

    function toggleHomeTabs() {
      const tabs = document.getElementById('homeTabs');
      const btn = document.getElementById('homeTabsToggle');
      tabs.classList.toggle('expanded');
      btn.classList.toggle('open');
    }

    function openChapterPicker() {
      const overlay = document.getElementById('chapterPickerOverlay');
      let html = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">' +
        '<span style="font-family:var(--mono);font-size:0.82rem;color:var(--text-bright);">// chapters</span>' +
        '<button onclick="closeChapterPicker()" style="background:none;border:1px solid var(--border);border-radius:3px;padding:6px 14px;font-family:var(--mono);font-size:0.72rem;color:var(--text);cursor:pointer;">close</button></div>';
      chapterMap.forEach((ch, i) => {
        html += `<div class="chapter-picker-item" onclick="scrollToMobileChapter(${i})">
          <span class="picker-num">${i + 1}.</span>${ch.name}</div>`;
      });
      overlay.innerHTML = html;
      overlay.classList.add('open');
    }

    function closeChapterPicker() {
      document.getElementById('chapterPickerOverlay').classList.remove('open');
    }

    function scrollToMobileChapter(idx) {
      const el = document.getElementById('mobileChapter' + idx);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      closeChapterPicker();
    }

    // Guestbook entries (persisted in localStorage)
    let guestbookEntries = [];
    try {
      guestbookEntries = JSON.parse(localStorage.getItem('guestbook') || '[]');
    } catch(e) {}


    // ══════════════════════════════════════════
    // ── Utilities ──
    // ══════════════════════════════════════════
    function escapeHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function getChapterName(idx) {
      let name = '';
      for (let i = chapterMap.length - 1; i >= 0; i--) {
        if (idx >= chapterMap[i].slideIndex) { name = chapterMap[i].name; break; }
      }
      return name;
    }

    function preloadAdjacent(idx) {
      [-1, 1, 2].forEach(offset => {
        const i = idx + offset;
        if (i >= 0 && i < slides.length && slides[i].type === 'image') {
          const img = new Image();
          img.src = slides[i].src;
        }
      });
    }

    function setTitle(suffix) {
      document.title = suffix ? `jack wasielewski — ${suffix}` : 'jack wasielewski';
    }


    // ══════════════════════════════════════════
    // ── Slide rendering ──
    // ══════════════════════════════════════════
    function videoEmbedHTML(id, label, size) {
      const thumbUrl = `https://img.youtube.com/vi/${id}/maxresdefault.jpg`;
      const watchUrl = `https://www.youtube.com/watch?v=${id}`;
      const cls = size === 'full' ? 'slide-video' : 'video-embed';
      return `
        <div class="${cls} yt-thumb-player" data-yt-id="${id}">
          <img src="${thumbUrl}" alt="${label}" style="width:100%;height:100%;object-fit:cover;cursor:pointer;display:block;">
          <div class="yt-play-btn" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:68px;height:48px;background:rgba(0,0,0,0.75);border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="#fff"><polygon points="6,4 20,12 6,20"/></svg>
          </div>
          <a href="${watchUrl}" target="_blank" rel="noopener" style="position:absolute;bottom:8px;right:10px;font-size:0.65rem;color:rgba(255,255,255,0.7);font-family:var(--mono);text-decoration:none;">open on youtube &#8599;</a>
        </div>
      `;
    }

    document.addEventListener('click', function(e) {
      const player = e.target.closest('.yt-thumb-player');
      if (!player) return;
      if (e.target.closest('a')) return;
      const id = player.dataset.ytId;
      player.innerHTML = `<iframe src="https://www.youtube-nocookie.com/embed/${id}?autoplay=1"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen style="position:absolute;top:0;left:0;width:100%;height:100%;border:none;"></iframe>`;
    });

    function linkSlideHTML(s) {
      const bgStyle = s.thumb ? `background-image:url('${s.thumb}');background-size:cover;background-position:center;` : '';
      return `<div class="slide-link-wrap" style="${bgStyle}">
        <a class="slide-link-overlay" href="${s.url}" target="_blank" rel="noopener">
          <span class="slide-link-cta">${s.cta} &#8599;</span>
        </a>
      </div>`;
    }

    function slideHTML(idx) {
      const s = slides[idx];
      if (s.type === 'video') {
        return videoEmbedHTML(s.id, s.label, 'full');
      }
      if (s.type === 'link') {
        return linkSlideHTML(s);
      }
      return `<img src="${s.src}" alt="Portfolio spread ${s.spreadNum}" draggable="false">`;
    }


    // ══════════════════════════════════════════
    // ── Page renderers ──
    // ══════════════════════════════════════════
    function renderHome() {
      const tabs = `<div class="chapter-tab active" onclick="filterHome('all')">all pages</div>` +
        chapterMap.map((c, i) => `<div class="chapter-tab" onclick="filterHome(${i})">${c.name}</div>`).join('');

      return `
        <div class="output-block">
          <div class="home-tagline">
            <span class="name">jack wasielewski</span>
            <span class="sep">/</span> designer
            <span class="sep">/</span> M.Arch SCI-Arc
            <span class="sep">/</span> B.Arch Virginia Tech
          </div>
          <div class="home-sub">

    function submitGuestbook() {
      const name = document.getElementById('gbName').value.trim();
      const msg = document.getElementById('gbMsg').value.trim();
      if (!name || !msg) return;

      const entry = {
        name: name,
        message: msg,
        date: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }),
      };

      guestbookEntries.push(entry);
      try { localStorage.setItem('guestbook', JSON.stringify(guestbookEntries)); } catch(e) {}

      // Re-render entries
      document.getElementById('gbName').value = '';
      document.getElementById('gbMsg').value = '';
      const container = document.getElementById('gbEntries');
      container.innerHTML = guestbookEntries.slice().reverse().map(e =>
        `<div class="gb-entry">

    function navSlide(dir) {
      const next = currentSlide + dir;
      if (next < 0 || next >= slides.length) return;
      currentSlide = next;
      updateSlide();
    }

    function goToSlide(idx) {
      currentSlide = Math.max(0, Math.min(idx, slides.length - 1));
      updateSlide();
    }

    function updateSlide() {
      const viewport = document.getElementById('slideshowViewport');
      if (!viewport) return;
      viewport.innerHTML = `<div class="slide-fade">${slideHTML(currentSlide)}</div>`;
      viewport.classList.toggle('has-video', slides[currentSlide].type === 'video');
      viewport.classList.toggle('has-link', slides[currentSlide].type === 'link');
      document.getElementById('slideCounter').textContent = `${currentSlide + 1} / ${slides.length}`;
      const chEl = document.getElementById('slideChapter');
      if (chEl) chEl.textContent = getChapterName(currentSlide);
      document.getElementById('btnPrev').disabled = currentSlide === 0;
      document.getElementById('btnNext').disabled = currentSlide === slides.length - 1;
      const progEl = document.getElementById('slideProgress');
      if (progEl) progEl.style.width = `${((currentSlide + 1) / slides.length * 100).toFixed(1)}%`;
      preloadAdjacent(currentSlide);
      setTitle(`portfolio — ${getChapterName(currentSlide)}`);

    // ══════════════════════════════════════════
    let presentMode = false;

    function openPresent() {
      // First navigate to portfolio if not already there
      if (currentPage !== 'portfolio') {
        navigate('portfolio', renderPortfolio);
      }
      presentMode = true;
      const overlay = document.getElementById('presentOverlay');
      overlay.classList.add('open');
      document.getElementById('terminalBar').style.display = 'none';
      document.getElementById('presentExitHint').textContent = isMobile() ? 'tap to exit' : 'esc to exit';
      updatePresent();
      overlay.focus();

      // Request browser fullscreen
      if (document.documentElement.requestFullscreen) {
        document.documentElement.requestFullscreen().catch(() => {});
      }
    }

    function closePresent() {
      presentMode = false;
      document.getElementById('presentOverlay').classList.remove('open');
      document.getElementById('terminalBar').style.display = '';

      if (document.fullscreenElement) {
        document.exitFullscreen().catch(() => {});
      }
    }

    function updatePresent() {
      const content = document.getElementById('presentContent');
      const s = slides[currentSlide];
      if (s.type === 'video') {
        content.innerHTML = `
          <div class="slide-video">
            <iframe src="https://www.youtube-nocookie.com/embed/${s.id}"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
              allowfullscreen></iframe>
          </div>
        `;
      } else if (s.type === 'link') {
        content.innerHTML = linkSlideHTML(s);
      } else {
        content.innerHTML = `<img src="${s.src}" alt="Portfolio spread ${s.spreadNum}" draggable="false">`;
      }
    }

    function presentNav(dir) {
      const next = currentSlide + dir;
      if (next < 0 || next >= slides.length) return;
      currentSlide = next;
      updatePresent();
      updateSlide();
    }

    // ── Swipe gestures for present mode ──
    (function() {
      const overlay = document.getElementById('presentOverlay');
      let startX = 0, startY = 0;
      overlay.addEventListener('touchstart', function(e) {
        startX = e.changedTouches[0].screenX;
        startY = e.changedTouches[0].screenY;
      }, { passive: true });
      overlay.addEventListener('touchend', function(e) {
        if (!presentMode) return;
        const dx = e.changedTouches[0].screenX - startX;
        const dy = e.changedTouches[0].screenY - startY;
        const ax = Math.abs(dx), ay = Math.abs(dy);
        if (ay > ax && dy > 80) { closePresent(); return; }
        if (ax > 50 && ax > ay) { presentNav(dx < 0 ? 1 : -1); }
      }, { passive: true });
    })();

    function launchPong() {
      const overlay = document.createElement('div');
      overlay.className = 'pong-overlay';
      overlay.id = 'pongOverlay';
      document.body.appendChild(overlay);

      let playerPick = null;
      let cpuPick = null;

      function renderSelect() {
        const fighters = pongFighters.map((f, i) => `
          <div class="pong-fighter" data-idx="${i}" onclick="window._pongPick(${i})">
            <img src="${getPongThumb(f)}" alt="${f.name}">
            <div class="pong-fighter-name">${f.name}</div>
          </div>
        `).join('');

        overlay.innerHTML = `
          <div class="pong-select">
            <h3>// dead ops arcade — select your fighter</h3>
            <p>pick a title spread. your opponent will be chosen at random.</p>
            <div class="pong-fighters">${fighters}</div>
            <div class="pong-vs" id="pongVs" style="display:none;">
              <div style="text-align:center;"><img id="pongP1Img" src="" alt="player"><div id="pongP1Name" style="font-size:0.65rem;color:#ccc;margin-top:4px;"></div></div>
              <span class="vs-text">vs</span>
              <div style="text-align:center;"><img id="pongP2Img" src="" alt="cpu"><div id="pongP2Name" style="font-size:0.65rem;color:#ccc;margin-top:4px;"></div></div>
            </div>
            <button class="pong-btn" id="pongStart" disabled onclick="window._pongStart()">select a fighter</button>
            <div class="pong-exit">esc to quit</div>
          </div>
        `;
      }

      window._pongPick = function(idx) {
        playerPick = idx;
        // Random CPU pick (different from player)
        do { cpuPick = Math.floor(Math.random() * pongFighters.length); } while (cpuPick === idx);

        document.querySelectorAll('.pong-fighter').forEach((el, i) => {
          el.classList.toggle('selected', i === idx);
        });

        const vs = document.getElementById('pongVs');
        vs.style.display = 'flex';
        document.getElementById('pongP1Img').src = getPongThumb(pongFighters[playerPick]);
        document.getElementById('pongP1Name').textContent = pongFighters[playerPick].name;
        document.getElementById('pongP2Img').src = getPongThumb(pongFighters[cpuPick]);
        document.getElementById('pongP2Name').textContent = pongFighters[cpuPick].name;

        const btn = document.getElementById('pongStart');
        btn.disabled = false;
        btn.textContent = 'fight';
      };

      window._pongStart = function() {
        if (playerPick === null) return;
        startPongGame(overlay, pongFighters[playerPick], pongFighters[cpuPick]);
      };

      renderSelect();

      // Esc to close
      function escHandler(e) {
        if (e.key === 'Escape') {
          overlay.remove();
          document.removeEventListener('keydown', escHandler);
          delete window._pongPick;
          delete window._pongStart;
        }
      }
      document.addEventListener('keydown', escHandler);
    }

    function startPongGame(overlay, p1, p2) {
      const W = 600, H = 380;
      const PADDLE_H = 75, PADDLE_W = 48, BALL_R = 6;
      const WIN_SCORE = 5;

      let p1Score = 0, p2Score = 0;
      let ballX = W / 2, ballY = H / 2;
      let ballDX = 3.5, ballDY = 2;
      let p1Y = H / 2 - PADDLE_H / 2, p2Y = H / 2 - PADDLE_H / 2;
      let mouseY = H / 2;
      let running = true;

      // Load paddle images
      const p1Img = new Image(); p1Img.src = getPongThumb(p1);
      const p2Img = new Image(); p2Img.src = getPongThumb(p2);

      overlay.innerHTML = `
        <div class="pong-score" id="pongScoreDisp">${p1.name}  0 — 0  ${p2.name}</div>
        <canvas id="pongCanvas" width="${W}" height="${H}"></canvas>
        <div class="pong-exit">first to ${WIN_SCORE} wins · esc to quit · move mouse to control paddle</div>
      `;

      const canvas = document.getElementById('pongCanvas');
      const ctx = canvas.getContext('2d');
      const scoreDisp = document.getElementById('pongScoreDisp');

      // Mouse control relative to canvas
      canvas.addEventListener('mousemove', e => {
        const rect = canvas.getBoundingClientRect();
        mouseY = ((e.clientY - rect.top) / rect.height) * H;
      });

      // Touch support
      canvas.addEventListener('touchmove', e => {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        mouseY = ((e.touches[0].clientY - rect.top) / rect.height) * H;
      }, { passive: false });

      function resetBall(direction) {
        ballX = W / 2;
        ballY = H / 2;
        ballDX = 3.5 * direction;
        ballDY = (Math.random() - 0.5) * 4;
      }

      function update() {
        // Player paddle follows mouse
        p1Y += (mouseY - PADDLE_H / 2 - p1Y) * 0.15;
        p1Y = Math.max(0, Math.min(H - PADDLE_H, p1Y));

        // CPU paddle — tracks ball with slight delay
        const cpuTarget = ballY - PADDLE_H / 2;
        p2Y += (cpuTarget - p2Y) * 0.06;
        p2Y = Math.max(0, Math.min(H - PADDLE_H, p2Y));

        // Ball movement
        ballX += ballDX;
        ballY += ballDY;

        // Top/bottom bounce
        if (ballY - BALL_R <= 0 || ballY + BALL_R >= H) {
          ballDY *= -1;
          ballY = Math.max(BALL_R, Math.min(H - BALL_R, ballY));
        }

        // Left paddle hit
        if (ballX - BALL_R <= 20 + PADDLE_W && ballY >= p1Y && ballY <= p1Y + PADDLE_H && ballDX < 0) {
          ballDX = Math.abs(ballDX) * 1.05;
          ballDY += (ballY - (p1Y + PADDLE_H / 2)) * 0.1;
          ballX = 20 + PADDLE_W + BALL_R;
        }

        // Right paddle hit
        if (ballX + BALL_R >= W - 20 - PADDLE_W && ballY >= p2Y && ballY <= p2Y + PADDLE_H && ballDX > 0) {
          ballDX = -Math.abs(ballDX) * 1.05;
          ballDY += (ballY - (p2Y + PADDLE_H / 2)) * 0.1;
          ballX = W - 20 - PADDLE_W - BALL_R;
        }

        // Cap speed
        ballDX = Math.max(-8, Math.min(8, ballDX));
        ballDY = Math.max(-6, Math.min(6, ballDY));

        // Scoring
        if (ballX < 0) { p2Score++; scoreDisp.textContent = `${p1.name}  ${p1Score} — ${p2Score}  ${p2.name}`; resetBall(1); }
        if (ballX > W) { p1Score++; scoreDisp.textContent = `${p1.name}  ${p1Score} — ${p2Score}  ${p2.name}`; resetBall(-1); }

        if (p1Score >= WIN_SCORE || p2Score >= WIN_SCORE) {
          running = false;
          const winner = p1Score >= WIN_SCORE ? p1.name : p2.name;
          scoreDisp.innerHTML = `<span style="color:var(--accent);">${winner} wins!</span>  ${p1Score} — ${p2Score}`;
          setTimeout(() => {
            overlay.remove();
            delete window._pongPick;
            delete window._pongStart;
          }, 2500);
        }
      }

      function draw() {
        ctx.fillStyle = '#0a0a0f';
        ctx.fillRect(0, 0, W, H);

        // Center line
        ctx.setLineDash([4, 6]);
        ctx.strokeStyle = 'rgba(255,255,255,0.1)';
        ctx.beginPath();
        ctx.moveTo(W / 2, 0);
        ctx.lineTo(W / 2, H);
        ctx.stroke();
        ctx.setLineDash([]);

        // Paddles — draw spread image cropped to center (cover fit)
        function drawPaddle(img, x, y, borderColor) {
          ctx.save();
          ctx.beginPath();
          ctx.roundRect(x, y, PADDLE_W, PADDLE_H, 3);
          ctx.clip();
          if (img.complete && img.naturalWidth) {
            // Cover-fit: crop center of image to fill paddle
            const iw = img.naturalWidth, ih = img.naturalHeight;
            const paddleRatio = PADDLE_W / PADDLE_H;
            const imgRatio = iw / ih;
            let sx, sy, sw, sh;
            if (imgRatio > paddleRatio) {
              sh = ih; sw = ih * paddleRatio;
              sx = (iw - sw) / 2; sy = 0;
            } else {
              sw = iw; sh = iw / paddleRatio;
              sx = 0; sy = (ih - sh) / 2;
            }
            ctx.drawImage(img, sx, sy, sw, sh, x, y, PADDLE_W, PADDLE_H);
          } else {
            ctx.fillStyle = borderColor;
            ctx.fillRect(x, y, PADDLE_W, PADDLE_H);
          }
          ctx.restore();
          ctx.strokeStyle = borderColor;
          ctx.lineWidth = 1.5;
          ctx.strokeRect(x, y, PADDLE_W, PADDLE_H);
        }
        drawPaddle(p1Img, 20, p1Y, '#7b5fbf');
        drawPaddle(p2Img, W - 20 - PADDLE_W, p2Y, '#bf5f5f');

        // Ball
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(ballX, ballY, BALL_R, 0, Math.PI * 2);
        ctx.fill();
      }

      function gameLoop() {
        if (!running) return;
        update();
        draw();
        requestAnimationFrame(gameLoop);
      }

      // Esc to quit
      function escHandler(e) {
        if (e.key === 'Escape') {
          running = false;
          overlay.remove();
          document.removeEventListener('keydown', escHandler);
          delete window._pongPick;
          delete window._pongStart;
        }
      }
      document.removeEventListener('keydown', arguments.callee);
      document.addEventListener('keydown', escHandler);

      gameLoop();
    }


    // ══════════════════════════════════════════
    // ── Command execution ──
    // ══════════════════════════════════════════
    const cmdResponses = {
      'home': 'grid view', 'portfolio': 'slideshow', 'showreel': 'animation reel',
      'show reel': 'animation reel', 'resume': 'cv', 'cv': 'cv', 'about': 'bio',
      'contact': 'contact info', 'help': 'commands', 'guestbook': 'guestbook',
      'clear': 'reset', 'random': 'random spread', 'fullscreen': 'presenting',
      'present': 'presenting', 'doa': 'fight!',
    };

    function updateTerminalHistory(cmd) {
      const hist = document.getElementById('terminalHistory');
      const response = cmdResponses[cmd] || 'ok';
      const line = document.createElement('div');
      line.className = 'terminal-history-line';
      line.innerHTML = `<span class="hist-cmd">› ${cmd}</span> <span class="hist-result">— ${response}</span>`;
      hist.appendChild(line);
      // Keep only last 3 lines
      while (hist.children.length > 2) hist.removeChild(hist.firstChild);
    }

    function runCmd(cmd) {
      cmd = cmd.trim().toLowerCase();
      if (!cmd) return;

      // Add to history (feature #1)
      if (cmdHistory[cmdHistory.length - 1] !== cmd) {
        cmdHistory.push(cmd);
      }
      historyIdx = cmdHistory.length;
      updateTerminalHistory(cmd);

      if (cmd === 'clear') {
        navigate('home', renderHome);
        document.getElementById('cmdInput').value = '';
        return;
      }

      // Compare command: compare A B
      const compareMatch = cmd.match(/^compare\s+(\d+)\s+(\d+)$/);
      if (compareMatch) {
        const a = parseInt(compareMatch[1]);
        const b = parseInt(compareMatch[2]);
        currentPage = 'compare';
        document.getElementById('contentInner').innerHTML = renderCompare(a, b);
        setTitle(`compare ${a} vs ${b}`);
        document.getElementById('cmdInput').value = '';
        window.scrollTo({ top: 0 });
        return;
      }

      // Fullscreen command
      if (cmd === 'fullscreen' || cmd === 'present') {
        openPresent();
        document.getElementById('cmdInput').value = '';
        return;
      }

      // Random command
      if (cmd === 'random') {
        if (currentPage !== 'portfolio') {
          navigate('portfolio', renderPortfolio);
        }
        const idx = Math.floor(Math.random() * slides.length);
        goToSlide(idx);
        document.getElementById('cmdInput').value = '';
        window.scrollTo({ top: 0 });
        return;
      }

      // DOA - pong
      if (cmd === 'doa') {
        launchPong();
        document.getElementById('cmdInput').value = '';
        return;
      }

      const pages = {
        'home': renderHome,
        'portfolio': renderPortfolio,
        'showreel': renderShowreel,
        'show reel': renderShowreel,
        'resume': renderResume,
        'cv': renderResume,
        'about': renderAbout,
        'contact': renderContact,
        'help': renderHelp,
        'guestbook': renderGuestbook,
      };

      if (pages[cmd]) {
        navigate(cmd, pages[cmd]);
      } else {
        document.getElementById('contentInner').innerHTML = renderUnknown(cmd);
      }

      document.getElementById('cmdInput').value = '';
      window.scrollTo({ top: 0 });
    }

    function navigate(page, renderFn) {
      currentPage = page;
      currentSlide = 0;
      document.getElementById('contentInner').innerHTML = renderFn();

      if (page === 'portfolio') {
        requestAnimationFrame(setupLazyLoad);
        preloadAdjacent(0);
        setTitle('portfolio — ' + getChapterName(0));
      } else if (page === 'home') {
        setTitle('');
        buildHomeGrid('all');
      } else {
        setTitle(page);
      }

      if (page !== 'home') {
        history.pushState(null, '', '#' + page);
      } else {
        history.pushState(null, '', window.location.pathname);
      }
    }


    // ══════════════════════════════════════════
    // ── Lazy loading (mobile scroll) ──
    // ══════════════════════════════════════════
    function setupLazyLoad() {
      const images = document.querySelectorAll('.mobile-scroll .spread img[data-src]');
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const img = entry.target;
            img.src = img.dataset.src;
            img.onload = () => img.classList.add('loaded');
            observer.unobserve(img);
          }
        });
      }, { rootMargin: '400px' });
      images.forEach(img => observer.observe(img));
    }


    // ══════════════════════════════════════════
    // ── Keyboard shortcuts ──
    // ══════════════════════════════════════════
    document.addEventListener('keydown', function(e) {
      const input = document.getElementById('cmdInput');
      // Escape closes overlays
      if (e.key === 'Escape') {
        if (presentMode) { closePresent(); return; }
      }

      // Fullscreen/presentation mode keys
      if (presentMode) {
        if (e.key === 'ArrowLeft') { presentNav(-1); e.preventDefault(); }
        if (e.key === 'ArrowRight' || e.key === ' ') { presentNav(1); e.preventDefault(); }
        return;
      }

      // If focused on input: handle history + Enter
      if (document.activeElement === input) {
        // Command history (feature #1)
        if (e.key === 'ArrowUp') {
          e.preventDefault();
          if (historyIdx > 0) {
            historyIdx--;
            input.value = cmdHistory[historyIdx];
          }
          return;
        }
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          if (historyIdx < cmdHistory.length - 1) {
            historyIdx++;
            input.value = cmdHistory[historyIdx];
          } else {
            historyIdx = cmdHistory.length;
            input.value = '';
          }
          return;
        }
        if (e.key === 'Enter') {
          const val = input.value.trim();
          if (val) runCmd(val);
        }
        return;
      }

      // Portfolio keyboard shortcuts
      if (currentPage === 'portfolio') {
        if (e.key === 'ArrowLeft') { navSlide(-1); e.preventDefault(); }
        if (e.key === 'ArrowRight') { navSlide(1); e.preventDefault(); }
        if (e.key === 'f' || e.key === 'F') { openPresent(); e.preventDefault(); }
        if (e.key === 'g' || e.key === 'G') { openOverview(); e.preventDefault(); }
        return;
      }

      // Auto-focus terminal on typing
      if (!e.ctrlKey && !e.metaKey && !e.altKey && e.key.length === 1) {
        input.focus();
      }
    });


    // ══════════════════════════════════════════
    // ── Scroll: smart back to top ──
    // ══════════════════════════════════════════
    function smartScrollUp() {
      if (!isMobile() || currentPage !== 'portfolio') {
        window.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }
      // Find the chapter divider above current scroll position
      const dividers = document.querySelectorAll('.mobile-chapter-divider');
      let target = null;
      for (let i = dividers.length - 1; i >= 0; i--) {
        const rect = dividers[i].getBoundingClientRect();
        if (rect.top < -10) { // divider is above viewport
          target = dividers[i];
          break;
        }
      }
      if (target) {
        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      } else {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    }

    window.addEventListener('scroll', () => {
      document.getElementById('backToTop').classList.toggle('visible', window.scrollY > 600);
    });


    // ══════════════════════════════════════════
    // ── Hash routing ──
    // ══════════════════════════════════════════
    function handleHash() {
      const hash = window.location.hash.replace('#', '');
      if (hash) {
        runCmd(hash);
      } else {
        navigate('home', renderHome);
      }
    }


    // ══════════════════════════════════════════
    // ── Boot Sequence ──
    // ══════════════════════════════════════════
    (function bootSequence() {
      const overlay = document.getElementById('bootOverlay');
      if (!overlay) { initSite(); return; }

      const mobile = isMobile();

      // Build page content immediately — tagline, tabs, terminal all visible
      window._bootActive = true;
      initSite();

      // Auto-collapse terminal on mobile
      if (mobile) {
        document.getElementById('terminalBar').classList.add('terminal-collapsed');
        terminalCollapsed = true;
      }

      // Boot text lines animate over the page
      const lines = overlay.querySelectorAll('.boot-line');
      const delays = mobile ? [0, 240, 720] : [0, 400, 1200];

      lines.forEach((line, i) => {
        setTimeout(() => {
          line.classList.add('visible');
          if (i > 0) {
            const prevCursor = lines[i - 1].querySelector('.boot-cursor');
            if (prevCursor) prevCursor.style.display = 'none';
          }
        }, delays[i]);
      });

      // Fade out boot overlay
      setTimeout(() => {
        overlay.classList.add('fade-out');
      }, mobile ? 1080 : 1800);

      // After overlay gone, stagger the grid thumbnails in
      setTimeout(() => {
        overlay.remove();
        window._bootActive = false;
        if (!mobile) document.getElementById('cmdInput').focus();
        const thumbs = document.querySelectorAll('.home-thumb');
        thumbs.forEach((t, i) => setTimeout(() => t.classList.add('visible'), 15 * i));
      }, mobile ? 1380 : 2300);
    })();

    function initSite() {
      handleHash();
      window.addEventListener('popstate', handleHash);
    }
  </script>
</body>
